<div class="link-wrapper">
    <style scoped>
      ul.link a {
        color:var(--clr-h1-and-bold);
        text-decoration:none;
      }

      ul.link a:hover, a:focus {
        color: var(--clr-a-text-hvr);
      }
    </style>
    <ul class="link">
      {%- for platform in site.sidebar %}
      <!-- <li><a href="{{ platform.link }}"><i class="{{ platform.icon }}"></i> {{ platform.name }}</a></li> -->
       <li><a href="{{ platform.link }}">{{ platform.icon }}&nbsp;{{ platform.name }}</a></li>
      {%- endfor %}
    </ul>
  </div>

  <ul class="sidebar-nav">
  <!-- External links (Google Scholar, GitHub, etc.) -->
  {% for entry in site.sidebar %}
    <li>
      <a href="{{ entry.link }}">
        {{ entry.icon }}
        {{ entry.name }}
      </a>
    </li>
  {% endfor %}
</ul>

<!-- In-page navigation -->
<!-- In-page navigation only (external links already rendered by layout) -->
{% if site.nav %}
<hr style="border:none; border-top:1px solid var(--border-color, #ddd); margin:0.8em 0;">
<nav>
  <ul style="list-style:none; padding:0; margin:0;">
    {% for item in site.nav %}
      <li style="margin: 0.35em 0;">
        <a href="{{ item.link }}" style="text-decoration:none; font-size:0.85em;">
          {{ item.name }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
